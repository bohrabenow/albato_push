<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Push Notifications</title>
  <style>
    /* Весь оригинальный CSS БЕЗ ИЗМЕНЕНИЙ */
    body { 
      font-family: Arial, sans-serif; 
      padding: 15px; 
      width: 460px;
      margin: 0; 
    }
    #key-section { 
      margin-bottom: 20px; 
      padding-bottom: 15px; 
      border-bottom: 1px solid #eee;
    }
    h3 { 
      margin: 0 0 10px 0; 
      color: #333; 
      font-size: 16px;
    }

    #key { 
      width: 300px;              
      height: 48px; 
      font-family: monospace; 
      font-size: 14px; 
      padding: 6px 8px; 
      border: 1px solid #ddd; 
      border-radius: 4px; 
      box-sizing: border-box;
      vertical-align: top;
      display: inline-block;
    }

    .key-and-buttons {
      display: inline-block;
      vertical-align: top;
    }

    .button-group {
      display: inline-block;
      vertical-align: top;
      margin: 8px 0 0 0;         
      padding-left: 0;           
    }
    #copy, #toggle, #open, #power {
      width: 71px;               
      height: 48px;
      padding: 0;
      margin: 0 0 0 2px;         
      border: 1px solid #ddd;
      border-left: none;
      background: #f8f9fa;
      cursor: pointer;
      vertical-align: top;
      box-sizing: border-box;    
    }

    #power {
      margin-right: 0;
    }

    #copy {
      border-left: 1px solid #ddd;   
      border-radius: 4px;
      margin-left: 0;
    }
    #toggle {
      border-radius: 4px;            
    }
    #open, #power {
      border-radius: 4px;            
    }

    #copy:hover, #toggle:hover, #open:hover, #power:hover { 
      background: #e9ecef; 
    }

    #open img,
    #power img {
      width: 20px;
      height: 20px;
      display: block;
      margin: 14px auto;
    }

    button { 
      background: #4285f4; 
      color: white; 
      border: none; 
      padding: 10px 20px; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 14px;
      margin-top: 8px;
    }
    button:hover { 
      background: #3367d6; 
    }

    #status { 
      margin-top: 8px; 
      padding: 8px; 
      background: #d4edda; 
      color: #155724; 
      border-radius: 4px; 
      font-size: 14px;
      display: none;
    }

    /* История */
    #history {
      margin-top: 10px;
    }
    .push {
      margin-bottom: 8px;
      padding: 8px;
      border: 1px solid #eee;
      border-radius: 4px;
    }
    .push-title {
      font-weight: bold;
      margin-bottom: 4px;
    }
    .push-body {
      font-size: 13px;
      color: #555;
    }
    .no-pushes {
      color: #999;
      font-size: 13px;
      text-align: center;
      padding: 16px 0;
    }
  </style>
</head>
<body>
  <div id="key-section">
    <!-- 🔥 ТОЛЬКО ЭТО ИЗМЕНЕНО: добавлена ссылка справа от заголовка -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
      <h3>🔑 API Ключ:</h3>
      <a href="https://albato.com" target="_blank" style="font-size: 14px; color: #4285f4; text-decoration: none;">Инструкция</a>
    </div>

    <div class="key-and-buttons">
      <input type="password" id="key" readonly placeholder="Ключ появится автоматически...">
      <div class="button-group">
        <button id="copy" title="Копировать ключ">📋</button>
        <button id="toggle" title="Показать/скрыть ключ">👁️</button>
        <button id="open" title="Перейти в Albato">
          <img src="open-icon.png" alt="Открыть">
        </button>
        <button id="power" title="Включить/отключить доставку пушей">
          <img src="power-icon.png" alt="Включение">
        </button>
      </div>
    </div>

    <div id="status"></div>
  </div>

  <!-- История -->
  <div id="history"></div>

  <script src="popup.js"></script>
</body>
</html>
